<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程问答大挑战</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ range(1, 10000) | random }}">
</head>
<body>
    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header" onclick="toggleSidebar()">
                <h3 id="sidebarTitle">模型设定</h3>
                <span id="sidebarToggleIcon">◀</span>
            </div>
            <div id="sidebarContent" class="sidebar-content">
                <!-- 密码验证层 -->
                <div id="passwordLayer" class="sidebar-panel" style="display: flex; flex-direction: column; align-items: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <div class="password-inner">
                        <h3 style="margin-bottom: 15px; color: #fff;">请输入密码</h3>
                        <input type="password" id="passwordInput" placeholder="输入密码查看设置" maxlength="4" style="padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; text-align: center; font-size: 1.2rem; width: 150px; margin-bottom: 10px;">
                        <button onclick="verifyPassword()" class="primary-btn" style="width: 150px;">验证</button>
                        <p id="passwordError" style="color: #ff6b6b; font-size: 0.8rem; margin-top: 8px; display: none;">密码错误</p>
                    </div>
                </div>
                <!-- 设置内容层（密码验证通过后显示） -->
                <div id="settingsLayer" class="sidebar-panel" style="display: none;">
                    <div class="settings-body">
                        <div class="settings-input-group">
                            <h3>系统提示词 (System Prompt)</h3>
                            <textarea id="systemPrompt" placeholder="设定 AI 的角色和行为模式..."></textarea>
                        </div>

                        <div class="settings-input-group">
                            <h3>初始问候语</h3>
                            <textarea id="initialMessage" placeholder="设置 AI 的第一句话..."></textarea>
                        </div>
                    </div>

                    <div class="settings-actions">
                        <button id="applySettingsBtn" class="primary-btn" onclick="applySettings()" style="width: 100%;">应用设定</button>
                        <button onclick="lockSettings()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; width: 100%;">锁定设置</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 左侧折叠控制按钮 -->
        <div id="collapsedSidebarToggle" onclick="toggleSidebar()">
            <span style="writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 2px; font-size: 0.9rem;">展开设定</span>
            <span style="margin-top: 5px; font-size: 0.8rem;">▶</span>
        </div>

        <div class="chat-container" id="chatContainer">
            <header class="chat-header">
                <div class="challenge-header-tag">🧠 编程思考挑战</div>
            </header>

            <section class="challenge-hero" id="challengeHero">
                <div class="challenge-card" id="challengeCard">
                    <button id="challengeSpeakerBtn" class="challenge-speaker-btn" title="朗读这道题目">▶</button>
                    <div class="challenge-question" id="challengeQuestion">说说你对编程题目的理解，开始你的挑战吧！</div>
                    <div class="guidance-text" id="guidanceText">随便说说你的想法就可以，不用担心对错，先把你的思路表达出来吧。</div>
                </div>
            </section>

            <div class="chat-history" id="chatHistory"></div>

            <div class="chat-input-area">
                <div class="answer-panel">
                    <div class="transcribing-banner" aria-hidden="true">
                        <span class="transcribing-badge">⏳ 正在生成文本</span>
                        <div class="transcribing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                    <div class="section-label">✏️ 我的回答</div>
                    <div class="answer-controls">
                        <textarea id="userInput" placeholder="在这里写下你的回答吧…" rows="6"></textarea>
                    </div>
                </div>
                <div class="submit-actions">
                    <button id="micBtn" class="icon-btn" onclick="toggleVoiceInput()" title="语音作答">
                        <span class="mic-icon">🎤</span>
                        <span class="recording-ring"></span>
                    </button>
                    <input id="audioUploadInput" type="file" accept="audio/*,.wav,.mp3,.m4a,.aac,.amr,.ogg,.opus,.webm" style="display: none;" onchange="handleAudioFileSelected(event)">
                    <button id="sendBtn" class="primary-btn" onclick="sendMessage()">🚀 提交我的想法</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 密码验证相关变量和函数
        const CORRECT_PASSWORD = '9527';
        let isPasswordVerified = false;

        function verifyPassword(shouldPlaySound = true) {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('passwordError');
            const passwordLayer = document.getElementById('passwordLayer');
            const settingsLayer = document.getElementById('settingsLayer');

            if (shouldPlaySound) {
                playButtonClickCue();
            }

            if (input.value === CORRECT_PASSWORD) {
                isPasswordVerified = true;
                error.style.display = 'none';
                passwordLayer.style.display = 'none';
                settingsLayer.style.display = 'flex';
                input.value = ''; // 清空密码
            } else {
                error.style.display = 'block';
                input.value = '';
                input.focus();
            }
        }

        function lockSettings(shouldPlaySound = true) {
            if (shouldPlaySound) {
                playButtonClickCue();
            }
            isPasswordVerified = false;
            document.getElementById('passwordLayer').style.display = 'flex';
            document.getElementById('settingsLayer').style.display = 'none';
        }

        // 密码输入框回车验证
        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('passwordInput');
            if (passwordInput) {
                passwordInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        verifyPassword();
                    }
                });
            }
        });

        function toggleSidebar(shouldPlaySound = true) {
            const sidebar = document.getElementById('sidebar');
            const collapsedToggle = document.getElementById('collapsedSidebarToggle');

            if (shouldPlaySound) {
                playButtonClickCue();
            }

            if (sidebar.classList.contains('collapsed')) {
                // 展开
                sidebar.classList.remove('collapsed');
                collapsedToggle.style.display = 'none';
            } else {
                // 收起
                sidebar.classList.add('collapsed');
                collapsedToggle.style.display = 'flex';
                // 收起时自动锁定设置
                if (isPasswordVerified) {
                    lockSettings(false);
                }
            }
        }

        const chatContainer = document.getElementById('chatContainer');
        const challengeHero = document.getElementById('challengeHero');
        const chatHistory = document.getElementById('chatHistory');
        const chatInputArea = document.querySelector('.chat-input-area');
        const answerPanel = document.querySelector('.answer-panel');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const audioUploadInput = document.getElementById('audioUploadInput');
        const challengeQuestion = document.getElementById('challengeQuestion');
        const guidanceText = document.getElementById('guidanceText');
        const challengeSpeakerBtn = document.getElementById('challengeSpeakerBtn');

        const systemPromptInput = document.getElementById('systemPrompt');
        const initialMessageInput = document.getElementById('initialMessage');
        const defaultAnswerPlaceholder = '在这里写下你的回答吧…';

        let systemPrompt = '';
        let currentChallengeText = '';
        let currentAudio = null; // 用于存储当前播放的音频对象
        let activeSpeakerBtn = null;
        let speechPlaybackMeta = null;
        let completionDelayTimer = null;
        let feedbackPlaybackToken = 0;
        let completionCard = null;
        let pendingFeedbackText = '';
        let isPreparingFeedbackAudio = false;
        let isManualFeedbackStopPending = false;
        let isFeedbackPlaybackActive = false;
        let isTranscribingAudio = false;
        let isStoppingRecording = false;
        let submitButtonRestoreTitle = sendBtn.textContent;

        function updateSendButtonState() {
            const hasInput = userInput.value.trim().length > 0;
            sendBtn.disabled = !hasInput || isTranscribingAudio;
        }

        function setTranscribingState(isTranscribing) {
            isTranscribingAudio = isTranscribing;
            chatInputArea.classList.toggle('transcribing', isTranscribing);
            answerPanel.classList.toggle('transcribing', isTranscribing);
            userInput.classList.toggle('transcribing', isTranscribing);
            userInput.placeholder = isTranscribing ? '正在识别语音并生成文本，请稍等...' : defaultAnswerPlaceholder;
            micBtn.disabled = isTranscribing;
            sendBtn.textContent = isTranscribing ? '⏳ 正在生成文本...' : submitButtonRestoreTitle;
            updateSendButtonState();
        }

        function resetSpeakerButton(btnElement) {
            if (!btnElement) {
                return;
            }
            btnElement.innerHTML = '▶';
            btnElement.title = btnElement === challengeSpeakerBtn ? '朗读这道题目' : '朗读这段点评';
            btnElement.classList.remove('playing', 'loading');
            btnElement.removeAttribute('aria-label');
        }

        function removeCompletionCard() {
            if (completionCard) {
                completionCard.remove();
                completionCard = null;
            }
        }

        function playCelebrationCue() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                return;
            }

            if (!audioCueContext) {
                audioCueContext = new AudioContextClass();
            }

            if (audioCueContext.state === 'suspended') {
                audioCueContext.resume().catch(() => {});
            }

            const now = audioCueContext.currentTime;
            const notes = [784, 988, 1175];

            notes.forEach((frequency, index) => {
                const oscillator = audioCueContext.createOscillator();
                const gainNode = audioCueContext.createGain();
                const startTime = now + index * 0.12;
                const endTime = startTime + 0.22;

                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(frequency, startTime);

                gainNode.gain.setValueAtTime(0.0001, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.22, startTime + 0.03);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, endTime);

                oscillator.connect(gainNode);
                gainNode.connect(audioCueContext.destination);
                oscillator.start(startTime);
                oscillator.stop(endTime + 0.02);
            });
        }

        function scrollCompletionCardIntoView() {
            if (!completionCard) {
                return;
            }

            requestAnimationFrame(() => {
                completionCard.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest'
                });
            });
        }

        function renderCompletionCard() {
            removeCompletionCard();

            completionCard = document.createElement('div');
            completionCard.id = 'completionCard';
            completionCard.className = 'message completion-message';
            completionCard.setAttribute('aria-hidden', 'false');
            completionCard.innerHTML = `
                <div class="challenge-complete-badge">🎉 已完成挑战</div>
                <div class="challenge-complete-title">你完成了本题挑战！</div>
                <div class="challenge-complete-subtitle">老师已经听到了你的想法，继续保持表达力。</div>
                <div class="challenge-complete-points">⭐ 表达力 +1</div>
            `;
            chatHistory.appendChild(completionCard);
            playCelebrationCue();
            scrollCompletionCardIntoView();
        }

        function resetChallengeCompletionState() {
            if (completionDelayTimer) {
                clearTimeout(completionDelayTimer);
                completionDelayTimer = null;
            }
            pendingFeedbackText = '';
            isPreparingFeedbackAudio = false;
            isManualFeedbackStopPending = false;
            isFeedbackPlaybackActive = false;
            removeCompletionCard();
            feedbackPlaybackToken = 0;
            chatContainer.classList.remove('submitted', 'completed');
            challengeHero.classList.remove('submitted', 'completed');
        }

        function scheduleChallengeCompletion(playbackToken = feedbackPlaybackToken) {
            if (completionDelayTimer) {
                clearTimeout(completionDelayTimer);
            }

            completionDelayTimer = window.setTimeout(() => {
                if (!chatContainer.classList.contains('submitted')) {
                    return;
                }
                if (playbackToken !== feedbackPlaybackToken) {
                    return;
                }
                chatContainer.classList.add('completed');
                challengeHero.classList.add('completed');
                isManualFeedbackStopPending = false;
                isFeedbackPlaybackActive = false;
                renderCompletionCard();
                completionDelayTimer = null;
            }, 3000);
        }

        function handleTrackedPlaybackInterrupted(playbackToken) {
            if (playbackToken !== feedbackPlaybackToken || !chatContainer.classList.contains('submitted')) {
                return;
            }

            scheduleChallengeCompletion(playbackToken);
        }

        async function prepareTtsAudio(text) {
            const response = await fetch('/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });

            const data = await response.json();

            if (!response.ok || !data.audio_url) {
                throw new Error(data.error || '语音生成失败');
            }

            return data.audio_url;
        }

        function renderFeedbackMessage(text) {
            const msgDiv = appendMessage('ai', text);
            return msgDiv.querySelector('.speaker-btn');
        }

        async function startFeedbackPlayback(text, btnElement = null, preparedAudioUrl = null) {
            feedbackPlaybackToken += 1;
            const playbackToken = feedbackPlaybackToken;
            isFeedbackPlaybackActive = true;

            return await speakText(text, btnElement, {
                trackCompletion: true,
                playbackToken,
                audioUrl: preparedAudioUrl,
                onEnded: () => {
                    isFeedbackPlaybackActive = false;
                    scheduleChallengeCompletion(playbackToken);
                },
                onInterrupted: () => {
                    isFeedbackPlaybackActive = false;
                    handleTrackedPlaybackInterrupted(playbackToken);
                }
            });
        }

        // 页面加载时从服务器加载设置
        async function loadSettings() {
            try {
                const response = await fetch('/settings');
                if (response.ok) {
                    const settings = await response.json();
                    systemPromptInput.value = settings.system_prompt || '';
                    initialMessageInput.value = settings.initial_message || '';
                    // 自动应用设置到界面
                    applySettings(false);
                }
            } catch (e) {
                console.error('加载设置失败:', e);
            }
        }

        // 保存设置到服务器
        async function saveSettings() {
            const settings = {
                system_prompt: systemPromptInput.value.trim(),
                initial_message: initialMessageInput.value.trim()
            };
            try {
                const response = await fetch('/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                return response.ok;
            } catch (e) {
                console.error('保存设置失败:', e);
                return false;
            }
        }

        async function applySettings(shouldSave = true) {
            playButtonClickCue();
            systemPrompt = systemPromptInput.value.trim();
            const initMsg = initialMessageInput.value.trim();

            // 保存到服务器
            if (shouldSave) {
                await saveSettings();
            }

            currentChallengeText = initMsg || '🧠 编程思考挑战 · 第1关\n🎯 任务和题目：说说你对一个编程概念的理解，开始你的思考吧！';
            challengeQuestion.innerHTML = currentChallengeText.replace(/\n/g, '<br>');

            // 清空历史记录并隐藏反馈区
            chatHistory.innerHTML = '';
            chatHistory.classList.remove('has-feedback');
            chatInputArea.classList.remove('hidden');
            resetChallengeCompletionState();

            userInput.value = '';
            userInput.disabled = false;
            sendBtn.disabled = false;
            micBtn.disabled = false;
            setTranscribingState(false);
            updateSendButtonState();
        }

        function canRecordInBrowser() {
            return Boolean(
                window.isSecureContext
                && navigator.mediaDevices
                && navigator.mediaDevices.getUserMedia
                && window.MediaRecorder
            );
        }

        function getVoiceInputFallbackReason() {
            if (!window.isSecureContext) {
                return '当前页面为 HTTP，浏览器通常不允许直接调用麦克风。请选择已录好的音频文件进行识别。';
            }
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                return '当前浏览器不支持网页直接录音。请选择音频文件进行识别。';
            }
            if (!window.MediaRecorder) {
                return '当前浏览器缺少录音组件支持。请选择音频文件进行识别。';
            }
            return '当前环境无法直接录音，请选择音频文件进行识别。';
        }

        function updateVoiceInputAvailability() {
            if (canRecordInBrowser()) {
                micBtn.title = '语音作答';
                micBtn.dataset.mode = 'record';
                return;
            }

            micBtn.title = '上传音频作答';
            micBtn.dataset.mode = 'upload';
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            // 默认收起侧边栏
            const sidebar = document.getElementById('sidebar');
            const collapsedToggle = document.getElementById('collapsedSidebarToggle');
            if (sidebar && collapsedToggle) {
                sidebar.classList.add('collapsed');
                collapsedToggle.style.display = 'flex';
            }
            updateVoiceInputAvailability();
            setTranscribingState(false);
            updateSendButtonState();
            userInput.addEventListener('input', updateSendButtonState);
        });

        // 语音录制初始化
        let mediaRecorder = null;
        let mediaStream = null;
        let audioMimeType = '';
        let isRecording = false;
        let asrSocket = null;
        let asrSessionId = null;
        let voiceInputBaseText = '';
        let finalizedTranscript = '';
        let interimTranscript = '';
        let hasStreamingTranscript = false;
        let preferStreamingPreview = false;
        let recordedAudioChunks = [];
        let audioCueContext = null;

        function triggerTrackedPlaybackInterruption(playbackMeta) {
            if (!playbackMeta || typeof playbackMeta.onInterrupted !== 'function') {
                return;
            }
            playbackMeta.onInterrupted();
        }

        function stopActiveSpeechPlayback() {
            const currentPlaybackMeta = speechPlaybackMeta;
            const currentBtn = activeSpeakerBtn;
            const shouldScheduleCompletion = Boolean(
                currentPlaybackMeta?.trackCompletion
                && isFeedbackPlaybackActive
                && chatContainer.classList.contains('submitted')
            );

            if (shouldScheduleCompletion) {
                isManualFeedbackStopPending = true;
                isFeedbackPlaybackActive = false;
            }

            if (currentAudio) {
                currentAudio.onended = null;
                currentAudio.onerror = null;
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            speechPlaybackMeta = null;
            currentAudio = null;
            resetSpeakerButton(currentBtn);
            if (activeSpeakerBtn === currentBtn) {
                activeSpeakerBtn = null;
            }

            if (shouldScheduleCompletion) {
                scheduleChallengeCompletion();
                return true;
            }

            isManualFeedbackStopPending = false;
            triggerTrackedPlaybackInterruption(currentPlaybackMeta);
            return false;
        }

        function getSupportedAudioMimeType() {
            const mimeTypes = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/ogg;codecs=opus',
                'audio/ogg'
            ];

            for (const mimeType of mimeTypes) {
                if (window.MediaRecorder && MediaRecorder.isTypeSupported(mimeType)) {
                    return mimeType;
                }
            }

            return '';
        }

        function getPreferredAudioExtension(mimeType) {
            if (mimeType.includes('webm')) return 'webm';
            if (mimeType.includes('ogg') || mimeType.includes('opus')) return 'ogg';
            return 'webm';
        }

        function getStreamingFormat(mimeType) {
            if (mimeType.includes('ogg') || mimeType.includes('opus')) return 'opus';
            return 'opus';
        }

        function buildAsrWebSocketUrl() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            return `${protocol}//${window.location.host}/ws/asr`;
        }

        function playRecordingCue(frequency, duration = 0.12) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                return;
            }

            if (!audioCueContext) {
                audioCueContext = new AudioContextClass();
            }

            if (audioCueContext.state === 'suspended') {
                audioCueContext.resume().catch(() => {});
            }

            const oscillator = audioCueContext.createOscillator();
            const gainNode = audioCueContext.createGain();
            const now = audioCueContext.currentTime;

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, now);

            gainNode.gain.setValueAtTime(0.0001, now);
            gainNode.gain.exponentialRampToValueAtTime(0.32, now + 0.02);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioCueContext.destination);
            oscillator.start(now);
            oscillator.stop(now + duration + 0.02);
        }

        function playRecordingStartCue() {
            playRecordingCue(880, 0.14);
        }

        function playRecordingStopCue() {
            playRecordingCue(520, 0.18);
        }

        function playButtonClickCue() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                return;
            }

            if (!audioCueContext) {
                audioCueContext = new AudioContextClass();
            }

            if (audioCueContext.state === 'suspended') {
                audioCueContext.resume().catch(() => {});
            }

            const now = audioCueContext.currentTime;
            const oscillator = audioCueContext.createOscillator();
            const gainNode = audioCueContext.createGain();

            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(620, now);
            oscillator.frequency.exponentialRampToValueAtTime(540, now + 0.07);

            gainNode.gain.setValueAtTime(0.0001, now);
            gainNode.gain.exponentialRampToValueAtTime(0.07, now + 0.012);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCueContext.destination);
            oscillator.start(now);
            oscillator.stop(now + 0.12);
        }

        function applyStreamingTranscript() {
            if (!preferStreamingPreview) {
                return;
            }

            const liveText = `${finalizedTranscript}${interimTranscript}`.trim();
            if (!liveText) {
                userInput.value = voiceInputBaseText;
                return;
            }

            userInput.value = voiceInputBaseText
                ? `${voiceInputBaseText}${liveText}`
                : liveText;
        }

        function resetStreamingTranscriptState() {
            voiceInputBaseText = userInput.value;
            finalizedTranscript = '';
            interimTranscript = '';
            hasStreamingTranscript = false;
            preferStreamingPreview = false;
            recordedAudioChunks = [];
        }

        function cleanupStreamingConnection() {
            if (asrSocket) {
                const socket = asrSocket;
                asrSocket = null;
                socket.onopen = null;
                socket.onmessage = null;
                socket.onerror = null;
                socket.onclose = null;
                if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
                    socket.close();
                }
            }
            asrSessionId = null;
        }

        function finalizeStreamingTranscript() {
            interimTranscript = '';
            if (!finalizedTranscript) {
                userInput.value = voiceInputBaseText;
                return;
            }

            userInput.value = voiceInputBaseText
                ? `${voiceInputBaseText}${finalizedTranscript}`
                : finalizedTranscript;
            voiceInputBaseText = userInput.value;
            hasStreamingTranscript = true;
        }

        async function uploadAudioForTranscription(audioSource, fileName, mimeType) {
            const sourceMimeType = mimeType || audioSource.type || audioMimeType || 'audio/webm';
            const formData = new FormData();
            const extension = getPreferredAudioExtension(sourceMimeType);
            const resolvedFileName = fileName || `recording.${extension}`;
            formData.append('audio', audioSource, resolvedFileName);

            const response = await fetch('/asr', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || '语音识别失败');
            }

            return data.text || '';
        }

        function openAudioFilePicker() {
            if (!audioUploadInput) {
                appendMessage('error', '当前环境无法选择音频文件');
                return;
            }

            appendMessage('ai', getVoiceInputFallbackReason());
            audioUploadInput.value = '';
            audioUploadInput.click();
        }

        async function handleAudioFileSelected(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) {
                return;
            }

            const previousPlaceholder = userInput.placeholder;
            setTranscribingState(true);

            try {
                const transcript = await uploadAudioForTranscription(file, file.name, file.type);
                if (!transcript) {
                    throw new Error('未识别到有效语音内容');
                }
                userInput.value = userInput.value
                    ? `${userInput.value}${transcript}`
                    : transcript;
                userInput.focus();
            } catch (e) {
                console.error('音频文件识别失败:', e);
                appendMessage('error', e.message || '音频文件识别失败');
            } finally {
                setTranscribingState(false);
                userInput.placeholder = previousPlaceholder;
                event.target.value = '';
                updateSendButtonState();
            }
        }

        async function openAsrStream() {
            cleanupStreamingConnection();
            resetStreamingTranscriptState();

            const socket = new WebSocket(buildAsrWebSocketUrl());
            asrSocket = socket;
            asrSessionId = `asr-${Date.now()}`;

            return await new Promise((resolve, reject) => {
                let started = false;

                socket.onopen = function() {
                    socket.send(JSON.stringify({
                        type: 'start',
                        sessionId: asrSessionId,
                        format: getStreamingFormat(audioMimeType),
                        sampleRate: 16000
                    }));
                };

                socket.onmessage = function(event) {
                    const data = JSON.parse(event.data);

                    if (data.type === 'started') {
                        started = true;
                        resolve();
                        return;
                    }

                    if (data.type === 'interim') {
                        if (!preferStreamingPreview) {
                            return;
                        }
                        interimTranscript = data.display_text || data.text || '';
                        hasStreamingTranscript = true;
                        applyStreamingTranscript();
                        return;
                    }

                    if (data.type === 'final') {
                        if (!preferStreamingPreview) {
                            return;
                        }
                        finalizedTranscript = data.full_text || `${finalizedTranscript}${data.text || ''}`;
                        interimTranscript = '';
                        hasStreamingTranscript = true;
                        applyStreamingTranscript();
                        return;
                    }

                    if (data.type === 'complete') {
                        if (preferStreamingPreview) {
                            finalizedTranscript = data.text || finalizedTranscript;
                            finalizeStreamingTranscript();
                        }
                        return;
                    }

                    if (data.type === 'error') {
                        reject(new Error(data.error || '语音识别失败'));
                    }
                };

                socket.onerror = function() {
                    if (!started) {
                        reject(new Error('无法建立语音识别连接'));
                    }
                };

                socket.onclose = function() {
                    if (asrSocket === socket) {
                        asrSocket = null;
                    }
                };
            });
        }

        async function startRecording() {
            if (!canRecordInBrowser()) {
                throw new Error(getVoiceInputFallbackReason());
            }

            audioMimeType = getSupportedAudioMimeType();
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    channelCount: 1,
                    noiseSuppression: true,
                    echoCancellation: false,
                    autoGainControl: false
                }
            });
            await openAsrStream();

            const recorderOptions = audioMimeType ? {
                mimeType: audioMimeType,
                audioBitsPerSecond: 128000
            } : undefined;
            mediaRecorder = new MediaRecorder(mediaStream, recorderOptions);

            mediaRecorder.ondataavailable = async function(event) {
                if (!event.data || event.data.size === 0) {
                    return;
                }

                recordedAudioChunks.push(event.data);

                if (!asrSocket || asrSocket.readyState !== WebSocket.OPEN) {
                    return;
                }

                const chunkBuffer = await event.data.arrayBuffer();
                asrSocket.send(chunkBuffer);
            };

            mediaRecorder.onerror = function(event) {
                console.error('录音失败:', event.error || event);
                appendMessage('error', '录音失败');
                stopRecording();
                cleanupStreamingConnection();
            };

            isRecording = true;
            micBtn.classList.add('recording');
            micBtn.title = '停止录音';
            micBtn.querySelector('.mic-icon').innerText = '⏹️';
            userInput.placeholder = '正在录音，请说出你的答案，再次点击结束...';
            stopActiveSpeechPlayback();
            playRecordingStartCue();
            await new Promise(resolve => setTimeout(resolve, 180));
            mediaRecorder.start(1000);
        }

        async function finishRecordingAndTranscribe() {
            if (!mediaRecorder) {
                return;
            }

            const recorder = mediaRecorder;
            const stream = mediaStream;
            const socket = asrSocket;
            mediaRecorder = null;
            mediaStream = null;
            setTranscribingState(true);

            try {
                await new Promise((resolve, reject) => {
                    recorder.addEventListener('stop', resolve, { once: true });
                    recorder.addEventListener('error', function handleError(event) {
                        reject(event.error || new Error('录音失败'));
                    }, { once: true });
                    recorder.requestData();
                    recorder.stop();
                });

                const audioBlob = recordedAudioChunks.length > 0
                    ? new Blob(recordedAudioChunks, { type: audioMimeType || 'audio/webm' })
                    : null;

                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ type: 'stop', sessionId: asrSessionId }));
                }

                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }

                if (audioBlob) {
                    const fallbackText = await uploadAudioForTranscription(audioBlob, null, audioMimeType || audioBlob.type);
                    finalizedTranscript = fallbackText || finalizedTranscript;
                    hasStreamingTranscript = Boolean(finalizedTranscript);
                }

                finalizeStreamingTranscript();
            } finally {
                cleanupStreamingConnection();
                isStoppingRecording = false;
                setTranscribingState(false);
                updateSendButtonState();
            }
        }

        async function toggleVoiceInput() {
            if (isRecording) {
                isStoppingRecording = true;
                stopRecording();
                try {
                    await finishRecordingAndTranscribe();
                } catch (e) {
                    console.error('语音识别失败:', e);
                    appendMessage('error', e.message || '语音识别失败');
                } finally {
                    userInput.focus();
                }
                return;
            }

            if (isStoppingRecording || isTranscribingAudio) {
                return;
            }

            if (!canRecordInBrowser()) {
                openAudioFilePicker();
                return;
            }

            try {
                await startRecording();
            } catch (e) {
                console.error('无法启动录音:', e);
                appendMessage('error', e.message || '无法启动录音');
                stopRecording();
                cleanupStreamingConnection();
            }
        }

        function stopRecording() {
            isRecording = false;
            isStoppingRecording = false;
            micBtn.classList.remove('recording');
            micBtn.title = '语音作答';
            micBtn.querySelector('.mic-icon').innerText = '🎤';
            userInput.placeholder = defaultAnswerPlaceholder;
            playRecordingStopCue();
        }

        // --- TTS (Text-to-Speech) 逻辑，替换为 Qwen TTS ---
        async function speakText(text, btnElement = null, options = {}) {
            const previousPlaybackMeta = speechPlaybackMeta;
            const previousBtn = activeSpeakerBtn;

            if (btnElement && activeSpeakerBtn === btnElement && currentAudio && !currentAudio.paused) {
                stopActiveSpeechPlayback();
                return true;
            }

            if (currentAudio) {
                if (currentAudio.onended) {
                    currentAudio.onended = null;
                }
                if (currentAudio.onerror) {
                    currentAudio.onerror = null;
                }
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            if (isManualFeedbackStopPending) {
                isManualFeedbackStopPending = false;
            } else {
                triggerTrackedPlaybackInterruption(previousPlaybackMeta);
            }

            speechPlaybackMeta = null;
            currentAudio = null;
            resetSpeakerButton(previousBtn);
            if (activeSpeakerBtn === previousBtn) {
                activeSpeakerBtn = null;
            }

            if (btnElement) {
                activeSpeakerBtn = btnElement;
                btnElement.innerHTML = '◌';
                btnElement.title = '正在生成语音...';
                btnElement.setAttribute('aria-label', '正在生成语音');
                btnElement.classList.add('loading');
                btnElement.classList.remove('playing');
            }

            try {
                const audioUrl = options.audioUrl || await prepareTtsAudio(text);
                const playbackAudio = new Audio(audioUrl);
                currentAudio = playbackAudio;
                speechPlaybackMeta = options;

                playbackAudio.onplay = () => {
                    if (btnElement && activeSpeakerBtn === btnElement) {
                        btnElement.innerHTML = '⏹️';
                        btnElement.title = '停止朗读';
                        btnElement.setAttribute('aria-label', '停止朗读');
                        btnElement.classList.remove('loading');
                        btnElement.classList.add('playing');
                    }
                };

                playbackAudio.onended = () => {
                    const completedPlaybackMeta = speechPlaybackMeta;
                    const completedBtn = activeSpeakerBtn;
                    speechPlaybackMeta = null;
                    currentAudio = null;
                    resetSpeakerButton(completedBtn);
                    if (activeSpeakerBtn === completedBtn) {
                        activeSpeakerBtn = null;
                    }
                    if (completedPlaybackMeta && typeof completedPlaybackMeta.onEnded === 'function') {
                        completedPlaybackMeta.onEnded();
                    }
                };

                playbackAudio.onerror = (e) => {
                    console.log('朗读出错', e);
                    const erroredPlaybackMeta = speechPlaybackMeta;
                    const erroredBtn = activeSpeakerBtn;
                    speechPlaybackMeta = null;
                    currentAudio = null;
                    resetSpeakerButton(erroredBtn);
                    if (activeSpeakerBtn === erroredBtn) {
                        activeSpeakerBtn = null;
                    }
                    if (erroredPlaybackMeta && typeof erroredPlaybackMeta.onInterrupted === 'function') {
                        erroredPlaybackMeta.onInterrupted();
                    }
                };

                await playbackAudio.play();
                return true;
            } catch (e) {
                console.error('请求 TTS 接口出错', e);
                if (options && typeof options.onInterrupted === 'function') {
                    options.onInterrupted();
                }
                speechPlaybackMeta = null;
                currentAudio = null;
                if (options?.trackCompletion) {
                    isFeedbackPlaybackActive = false;
                }
                resetSpeakerButton(btnElement);
                if (activeSpeakerBtn === btnElement) {
                    activeSpeakerBtn = null;
                }
                throw e;
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            playButtonClickCue();
            resetChallengeCompletionState();
            pendingFeedbackText = '';
            isPreparingFeedbackAudio = true;
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            micBtn.disabled = true;
            chatHistory.classList.add('has-feedback');
            chatInputArea.classList.add('hidden');
            chatContainer.classList.add('submitted');
            challengeHero.classList.add('submitted');

            appendMessage('user', message);

            const loadingId = 'loading-' + Date.now();
            appendLoading(loadingId);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: message, system_prompt: systemPrompt })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '发生未知错误');
                }

                pendingFeedbackText = data.response;
                const audioUrl = await prepareTtsAudio(data.response);

                removeMessage(loadingId);

                if (pendingFeedbackText !== data.response || !chatContainer.classList.contains('submitted')) {
                    return;
                }

                const speakerBtn = renderFeedbackMessage(data.response);
                pendingFeedbackText = '';
                await startFeedbackPlayback(data.response, speakerBtn, audioUrl);
            } catch (error) {
                removeMessage(loadingId);
                pendingFeedbackText = '';
                appendMessage('error', error.message || '网络请求失败，请检查后端服务是否运行。');
            } finally {
                isPreparingFeedbackAudio = false;
            }
        }

        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            const titleDiv = document.createElement('div');
            titleDiv.className = 'message-title';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (sender === 'user') {
                msgDiv.className = 'message user-message answer-card';
                titleDiv.textContent = '✏️ 我的回答';
                contentDiv.innerHTML = text.replace(/\n/g, '<br>');
                msgDiv.appendChild(titleDiv);
                msgDiv.appendChild(contentDiv);
            } else if (sender === 'ai') {
                msgDiv.className = 'message ai-message feedback-card';
                titleDiv.textContent = '🎉 老师点评';
                contentDiv.innerHTML = text.replace(/\n/g, '<br>');
                msgDiv.appendChild(titleDiv);
                msgDiv.appendChild(contentDiv);

                const speakerBtn = document.createElement('button');
                speakerBtn.className = 'speaker-btn';
                speakerBtn.innerHTML = '▶';
                speakerBtn.title = '朗读这段点评';
                speakerBtn.onclick = function() {
                    playButtonClickCue();
                    startFeedbackPlayback(text, speakerBtn);
                };
                msgDiv.appendChild(speakerBtn);
            } else if (sender === 'error') {
                msgDiv.className = 'message error-message';
                titleDiv.textContent = '💡 温馨提示';
                contentDiv.innerHTML = text;
                msgDiv.appendChild(titleDiv);
                msgDiv.appendChild(contentDiv);
            }

            chatHistory.appendChild(msgDiv);
            scrollToBottom();

            return msgDiv;
        }

        function appendLoading(id) {
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = 'message ai-message loading';
            msgDiv.innerHTML = `
                <div class="message-title">🧠 老师正在准备点评</div>
                <div class="message-content">
                    <div class="loading-text">老师正在生成点评语音，请稍等...</div>
                    <div class="loading-dots" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="loading-shimmer" aria-hidden="true">
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            chatHistory.appendChild(msgDiv);
            scrollToBottom();
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        challengeSpeakerBtn.onclick = function() {
            if (!currentChallengeText) {
                return;
            }
            playButtonClickCue();
            speakText(currentChallengeText, challengeSpeakerBtn);
        };
    </script>
